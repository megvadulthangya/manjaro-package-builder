name: Stable Manjaro Package Builder

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 3 * * *'  # Daily at 4 AM UTC
  push:
    paths:
      - 'packages.py'
      - 'config.py'
      - '.github/workflows/**'
      - '**/PKGBUILD'

jobs:
  build-and-deploy:
    name: Build and Deploy Packages
    runs-on: ubuntu-latest
    # Bot-loop guard: prevent workflow from running on hokibot commits
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write  # Required for token-based git push

    container:
      image: manjarolinux/build:latest

    env:
      # REQUIRED SECRETS (GitHub Secrets)
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      REPO_SERVER_URL: ${{ secrets.REPO_SERVER_URL }}
      REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
      REPO_NAME: ${{ secrets.REPO_NAME }}

      # PRIVACY-SECURE PACKAGER IDENTITY (GitHub Secret)
      PACKAGER_ENV: ${{ secrets.PACKAGER_ENV }}

      # OPTIONAL SECRETS
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      # GITHUB INTERNAL - Token-based authentication for hokibot
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      CI_PUSH_SSH_KEY: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}.git

    steps:
      # ================== DISK CLEANUP ==================
      # NOTE: The former separate "cleanup" job was removed because each
      # GitHub Actions job gets a FRESH runner - the disk space freed by
      # that job was never available to the build-and-deploy job.
      # The free-disk-space composite action runs on the host even inside
      # a container job, so inlining it here actually frees space for us.
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          remove-android: true
          remove-dotnet: true
          remove-haskell: true
          remove-docker: true
          force-remove-all-additional-packages: true

      - name: Disk usage AFTER cleanup
        run: |
          echo "=== DF -h ==="
          df -h

      - name: Checkout Code with Full History
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ================== CACHE: Pacman Package Cache ==================
      # Cache for system packages to avoid re-downloading pacman packages every run
      - name: Restore Pacman Package Cache
        uses: actions/cache@v4
        with:
          path: /mnt/pacman_cache
          key: ${{ runner.os }}-pacman-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pacman-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-
            ${{ runner.os }}-pacman-cache-

      # ================== CACHE: Yay AUR Cache ==================
      # Cache for AUR packages to avoid re-downloading AUR dependencies
      - name: Restore Yay AUR Cache
        uses: actions/cache@v4
        with:
          path: /mnt/yay_cache
          key: ${{ runner.os }}-yay-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-yay-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-
            ${{ runner.os }}-yay-cache-

      # ================== CACHE: VPS Repository Mirror ==================
      # Cache for remote VPS packages to avoid re-downloading from VPS every run
      - name: Restore VPS Repository Mirror Cache
        uses: actions/cache@v4
        with:
          path: /mnt/vps_cache
          key: ${{ runner.os }}-vps-mirror-cache-manjaro-awesome-${{ hashFiles('packages.py') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-vps-mirror-cache-manjaro-awesome-${{ hashFiles('packages.py') }}-
            ${{ runner.os }}-vps-mirror-cache-manjaro-awesome-
            ${{ runner.os }}-vps-mirror-cache-

      # ================== CACHE: Built Packages ==================
      # Cache for previously built packages to avoid rebuilding unchanged packages
      - name: Restore Built Packages Cache
        uses: actions/cache@v4
        with:
          path: |
            /mnt/build_artifacts
            build_aur
          key: ${{ runner.os }}-built-packages-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-built-packages-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-
            ${{ runner.os }}-built-packages-cache-

      - name: Initialize Modular Cache with Symlinks
        run: |
          echo "=== Initializing Modular Cache with Symlinks ==="

          mkdir -p /mnt/pacman_cache
          mkdir -p /mnt/yay_cache
          mkdir -p /mnt/vps_cache
          mkdir -p /mnt/build_artifacts

          chmod 777 /mnt/pacman_cache

          mkdir -p /root/.cache
          ln -sf /mnt/yay_cache /root/.cache/yay

          ln -sf /mnt/vps_cache /tmp/repo_mirror
          # Use a neutral path for artifacts initially
          ln -sf /mnt/build_artifacts /tmp/build_artifacts

          chmod -R 777 /mnt

      - name: Disable Broken Manjaro Repository Entries
        run: |
          echo "=== Disabling broken repository entries ==="

          # Disable [disk] repository section header
          sed -i 's/^\[disk\]/# [disk]/' /etc/pacman.conf

          # Disable [packages] repository section header (if present)
          sed -i 's/^\[packages\]/# [packages]/' /etc/pacman.conf

          # Disable any Server line pointing to the broken /build/packages/ directory
          sed -i 's|^Server = file:///build/packages|# Server = file:///build/packages|' /etc/pacman.conf

          # Apply same fixes to any included .conf files in /etc/pacman.d/
          find /etc/pacman.d/ -type f -name "*.conf" -exec sed -i 's/^\[disk\]/# [disk]/' {} \;
          find /etc/pacman.d/ -type f -name "*.conf" -exec sed -i 's/^\[packages\]/# [packages]/' {} \;
          find /etc/pacman.d/ -type f -name "*.conf" -exec sed -i 's|^Server = file:///build/packages|# Server = file:///build/packages|' {} \;

          echo "=== Relevant pacman config lines after cleanup ==="
          grep -R -nE '^\[disk\]|^\[packages\]|/build/packages|packages\.db|file://' /etc/pacman.conf /etc/pacman.d 2>/dev/null || true

          # NOTE: CacheDir modification is intentionally omitted here.
          # It will be applied AFTER the bootstrap/system upgrade to avoid
          # interfering with pacman's self-upgrade transaction.

      # ================== CONSOLIDATED SYSTEM BOOTSTRAP ==================
      # Merged the former "Install Python and Dependencies" and the
      # pacman -Syu call inside "Prepare Environment" into a single
      # system upgrade + package install (~2-4 min saved per run).
      - name: Bootstrap System and Install All Dependencies
        run: |
          echo "=== Bootstrap System Upgrade (CacheDir untouched) ==="

          # Backup original pacman.conf
          cp /etc/pacman.conf /etc/pacman.conf.backup-init

          # a) Temporarily set 'SigLevel = Never' to bypass signature checks
          echo "Setting SigLevel = Never"
          sed -i 's/^SigLevel.*/SigLevel = Never/g' /etc/pacman.conf

          # b) Do NOT run 'pacman -Scc' - it wipes the cache and breaks self-upgrade

          # c) Sync and update ONLY the keyrings first
          echo "Updating keyrings"
          pacman -Sy --noconfirm archlinux-keyring manjaro-keyring

          # d) Initialize and populate keyrings (done ONCE here for the whole workflow)
          echo "Initializing pacman keyring"
          pacman-key --init
          pacman-key --populate archlinux manjaro

          # e) Perform full system upgrade and install ALL dependencies in one shot
          #    (previously split across two separate pacman -Syu calls)
          echo "Performing full system upgrade and installing all dependencies"
          pacman -Syu --noconfirm --needed \
            python python-pip python-yaml python-setuptools \
            python-requests python-gitpython \
            git base-devel sudo \
            pacman-contrib \
            curl wget ca-certificates \
            openssh rsync \
            netcat iproute2 \
            jq \
            gnupg

          # f) Reset SigLevel to secure setting
          echo "Restoring secure SigLevel"
          mv /etc/pacman.conf.backup-init /etc/pacman.conf

          echo "Bootstrap upgrade complete"

      - name: Enable Persistent Pacman Cache
        run: |
          echo "=== Enabling Persistent Pacman Cache ==="
          # Now that pacman is fully upgraded and stable, redirect the cache
          # to the persistent /mnt/pacman_cache directory.
          sed -i 's|^#*CacheDir.*|CacheDir = /mnt/pacman_cache|' /etc/pacman.conf
          if ! grep -q "^CacheDir" /etc/pacman.conf; then
            echo "CacheDir = /mnt/pacman_cache" >> /etc/pacman.conf
          fi
          echo "CacheDir set to /mnt/pacman_cache"

      - name: Run Preflight Checker
        run: |
          python3 .github/scripts/syntax.py

      - name: Prepare Builder User and Environment
        run: |
          echo "=== Starting Environment Preparation ==="

          # Display cache status
          echo "Cache Status Report:"
          echo "  - Pacman cache: $(ls -1 /mnt/pacman_cache/*.pkg.tar.* 2>/dev/null | wc -l) files"
          echo "  - Yay cache: $(du -sh /root/.cache/yay 2>/dev/null | cut -f1 || echo '0')"
          echo "  - VPS mirror: $(ls -1 /tmp/repo_mirror/*.pkg.tar.* 2>/dev/null | wc -l) files"
          echo "  - Built packages: $(ls -1 /tmp/build_artifacts/*.pkg.tar.* 2>/dev/null | wc -l) files"
          echo "  - AUR sources: $(ls -1 build_aur/*/ 2>/dev/null | wc -l) directories"

          # Install vercmp for proper version comparison (already in pacman-contrib)
          if ! command -v vercmp &> /dev/null; then
            echo "Installing pacman-contrib for vercmp..."
            pacman -S --noconfirm pacman-contrib
          fi

          # ========== DESTROY AND REBUILD BUILDER USER ==========
          echo "=== DESTROY AND REBUILD BUILDER USER ==="

          # 1. DEBUG: List existing users and home directories
          echo "DEBUG: Current users and home directories:"
          cut -d: -f1,6 /etc/passwd | grep builder || echo "No builder user found"

          # 2. CLEANUP: Delete builder user if exists (forcefully with -r)
          if id builder >/dev/null 2>&1; then
            echo "CLEANUP: Removing existing builder user..."
            userdel -r builder || true
          else
            echo "CLEANUP: No builder user exists, skipping deletion."
          fi

          # 3. SETUP: Create builder user with proper home directory
          echo "SETUP: Creating builder user..."
          useradd -m -d /home/builder -s /bin/bash builder

          # Ensure the directory and required subdirs exist with correct permissions
          echo "SETUP: Ensuring /home/builder and dot directories exist with correct permissions..."
          mkdir -p /home/builder/.ssh /home/builder/.gnupg
          chmod 700 /home/builder/.ssh /home/builder/.gnupg

          # Fix ownership recursively
          echo "SETUP: Fixing ownership recursively..."
          chown -R builder:builder /home/builder

          # Grant NOPASSWD sudo access (required for build process)
          echo "SETUP: Granting NOPASSWD sudo access..."
          if ! grep -q '^builder ALL=(ALL) NOPASSWD: ALL$' /etc/sudoers; then
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          fi

          echo "Builder user setup complete."

          # 4. WORKSPACE: Ensure GITHUB_WORKSPACE is owned by builder
          echo "WORKSPACE: Setting ownership of GITHUB_WORKSPACE ($(pwd))..."
          chown -R builder:builder "$(pwd)"

          # Create build directories with correct permissions (if they don't exist from cache)
          mkdir -p "$(pwd)/build_aur"
          chown -R builder:builder "$(pwd)/build_aur"
          mkdir -p "/tmp/repo_mirror"
          chown -R builder:builder "/tmp/repo_mirror"

          # Link yay cache and build artifacts to builder's home
          mkdir -p /home/builder/.cache
          ln -sf /mnt/yay_cache /home/builder/.cache/yay
          ln -sf /mnt/build_artifacts /home/builder/build_artifacts
          chown -h builder:builder /home/builder/.cache/yay /home/builder/build_artifacts

          # Optimize makepkg for faster builds
          echo "Optimizing makepkg configuration..."
          sed -i '/^OPTIONS=/ s/ debug/ !debug/' /etc/makepkg.conf
          sed -i "s/^COMPRESSZST=.*/COMPRESSZST=(zstd -c -T0 --ultra -20 -)/" /etc/makepkg.conf
          sed -i "s/^BUILDENV=.*/BUILDENV=(!distcc color !ccache check !sign)/" /etc/makepkg.conf

          echo "Environment preparation complete"

      - name: Setup SSH for VPS
        run: |
          echo "=== Setting up SSH for VPS connection ==="

          # Create SSH directory for builder user (container invariant)
          mkdir -p /home/builder/.ssh
          chmod 700 /home/builder/.ssh

          # Write SSH key for VPS
          echo "Writing SSH key for VPS..."
          if echo "$VPS_SSH_KEY" | base64 -d >/dev/null 2>&1; then
            echo "Key appears to be base64 encoded, decoding..."
            echo "$VPS_SSH_KEY" | base64 -d > /home/builder/.ssh/id_ed25519
          else
            echo "Key is plain text, writing as-is..."
            echo "$VPS_SSH_KEY" > /home/builder/.ssh/id_ed25519
          fi

          chmod 600 /home/builder/.ssh/id_ed25519

          # Also add to known_hosts
          ssh-keyscan -H "$VPS_HOST" >> /home/builder/.ssh/known_hosts 2>/dev/null || true

          # Create SSH config for reliable connections
          cat > /home/builder/.ssh/config <<'SSHEOF'
          Host $VPS_HOST
            HostName $VPS_HOST
            User $VPS_USER
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 3
          SSHEOF

          chmod 600 /home/builder/.ssh/config
          chown -R builder:builder /home/builder/.ssh

          echo "SSH setup for VPS complete"

      - name: Configure Pacman Repository
        run: |
          echo "=== Configuring Pacman Repository ==="
          echo "Repository: $REPO_NAME"
          echo "Server URL: $REPO_SERVER_URL"

          if [ -z "$REPO_SERVER_URL" ]; then
            echo "REPO_SERVER_URL is empty - repository will not be configured in pacman.conf"
            exit 0
          fi

          # Check if repository already exists in pacman.conf
          if grep -q "^\[$REPO_NAME\]" /etc/pacman.conf; then
            echo "Repository '$REPO_NAME' already exists in pacman.conf"
            echo "Updating server URL if needed..."

            sed -i "/\[$REPO_NAME\]/,/^\[/ s|^Server = .*|Server = $REPO_SERVER_URL|" /etc/pacman.conf
          else
            echo "Adding repository '$REPO_NAME' to pacman.conf"

            TEMP_FILE=$(mktemp)
            cat > "$TEMP_FILE" <<'REPOEOF'

          # Custom repository: __REPO_NAME__
          # Repository will be dynamically enabled/disabled by builder.py
          [__REPO_NAME__]
          SigLevel = Optional TrustAll
          Server = __REPO_SERVER_URL__
          REPOEOF

            esc_sed() { printf '%s' "$1" | sed -e 's/[\\&|]/\\&/g'; }
            sed -i "s|__REPO_NAME__|$(esc_sed "$REPO_NAME")|g" "$TEMP_FILE"
            sed -i "s|__REPO_SERVER_URL__|$(esc_sed "$REPO_SERVER_URL")|g" "$TEMP_FILE"

            cat "$TEMP_FILE" >> /etc/pacman.conf
            rm -f "$TEMP_FILE"
          fi

          echo "=== Pacman.conf repository section ==="
          grep -A 2 "^\[$REPO_NAME\]" /etc/pacman.conf || echo "Repository not found in pacman.conf"

          echo ""
          echo "Pacman repository configuration complete"
          echo "Note: Repository will be enabled/disabled dynamically by builder.py"

      # ================== CONSOLIDATED CONNECTIVITY TEST ==================
      # Merged the former "Rsync Connection Test", "Network Diagnostics",
      # and the pre-build SSH test in "Run Builder" into a single focused
      # check. Eliminates ~30s of redundant SSH handshakes per run.
      - name: Connectivity and SSH Test
        run: |
          echo "=== Connectivity and SSH Test ==="

          # 1. Public IP (useful for fail2ban debugging)
          PUBLIC_IP=$(curl -s --connect-timeout 5 https://api.ipify.org || echo "Not available")
          echo "Public IP: $PUBLIC_IP"

          # 2. Test basic connectivity
          echo ""
          echo "Internet connectivity:"
          if ping -c 2 8.8.8.8 >/dev/null 2>&1; then
            echo "  OK"
          else
            echo "  No internet connectivity via IP - may be a container issue"
          fi

          # 3. Test VPS connectivity
          echo ""
          echo "VPS connectivity ($VPS_HOST:22):"
          if timeout 5 nc -z -w 2 "$VPS_HOST" 22; then
            echo "  Port 22 accessible"
          else
            echo "  Cannot reach VPS on port 22"
          fi

          # 4. Test SSH as builder user (single definitive test with identical
          #    options to builder.py, replacing three separate checks)
          echo ""
          echo "SSH connection test:"
          SSH_OPTIONS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o TCPKeepAlive=yes -o BatchMode=yes -o LogLevel=ERROR"

          if su builder -c "timeout 20 ssh $SSH_OPTIONS -i /home/builder/.ssh/id_ed25519 $VPS_USER@$VPS_HOST 'echo SSH_TEST_SUCCESS'" 2>/dev/null; then
            echo "  SSH connection to VPS successful"
          else
            echo "  SSH connection to VPS failed"
            if [ "$PUBLIC_IP" != "Not available" ]; then
              echo "  Fail2ban hint: sudo fail2ban-client set sshd unban $PUBLIC_IP"
            fi
          fi

          echo ""
          echo "Connectivity tests complete"

      - name: Install Build Dependencies
        run: |
          echo "=== Installing Build Dependencies ==="

          # Save current pacman.conf
          cp /etc/pacman.conf /etc/pacman.conf.backup

          # Temporarily comment out our repository to avoid 404 errors
          echo "Temporarily commenting out $REPO_NAME repository for dependency installation..."
          sed -i "/^\[$REPO_NAME\]/,/^\[/ s/^/#/" /etc/pacman.conf

          # Install remaining build tools
          echo "Installing build tools..."
          pacman -S --needed --noconfirm \
            appstream appstream-glib \
            meson ninja cmake \
            gtk-doc docbook-xsl libxslt \
            gobject-introspection \
            autoconf automake libtool pkg-config \
            patch make gcc binutils \
            file which tar gzip bzip2 xz zstd \
            unzip p7zip \
            dbus polkit \
            systemd systemd-sysvcompat \
            arch-install-scripts \
            ldc po4a dconf

          # Install yay for AUR dependencies (only if not cached)
          echo "=== Checking yay installation ==="
          if ! command -v yay &> /dev/null; then
            echo "Installing yay (retry + fallback)..."

            YAY_WORKDIR="$(mktemp -d -p /tmp yay-install-XXXXXXXX)"
            chown -R builder:builder "$YAY_WORKDIR"

            install_from_dir=""

            # 1) Primary: HTTPS git clone with retries (handles transient TLS EOF)
            for attempt in 1 2 3 4 5; do
              echo "yay: https git clone attempt ${attempt}/5"
              rm -rf "$YAY_WORKDIR/yay-bin"
              if sudo -u builder git -c http.lowSpeedLimit=1 -c http.lowSpeedTime=30 \
                clone --depth 1 https://aur.archlinux.org/yay-bin.git "$YAY_WORKDIR/yay-bin"; then
                install_from_dir="$YAY_WORKDIR/yay-bin"
                break
              fi
              sleep $((attempt * 3))
            done

            # 2) Fallback: SSH git clone (bypasses HTTPS/TLS entirely)
            if [ -z "$install_from_dir" ]; then
              echo "yay: https clone failed - trying SSH clone fallback..."
              SSH_CLONE_OPTS="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
              for attempt in 1 2 3 4 5; do
                echo "yay: ssh git clone attempt ${attempt}/5"
                rm -rf "$YAY_WORKDIR/yay-bin"
                if sudo -u builder env GIT_SSH_COMMAND="$SSH_CLONE_OPTS" \
                  timeout 90 git clone --depth 1 ssh://aur@aur.archlinux.org/yay-bin.git "$YAY_WORKDIR/yay-bin"; then
                  install_from_dir="$YAY_WORKDIR/yay-bin"
                  break
                fi
                sleep $((attempt * 3))
              done
            fi

            # 3) Fallback: snapshot tarball (no git; different endpoint/path, still HTTPS)
            if [ -z "$install_from_dir" ]; then
              echo "yay: git clone failed - trying snapshot fallback..."

              ok=0
              rm -f "$YAY_WORKDIR/yay-bin.tar.gz"
              for attempt in 1 2 3 4 5; do
                echo "yay: snapshot download attempt ${attempt}/5"
                rm -f "$YAY_WORKDIR/yay-bin.tar.gz"
                if sudo -u builder curl -fsSL --connect-timeout 20 \
                  -o "$YAY_WORKDIR/yay-bin.tar.gz" \
                  "https://aur.archlinux.org/cgit/aur.git/snapshot/yay-bin.tar.gz"; then
                  ok=1
                  break
                fi
                sleep $((attempt * 3))
              done

              if [ "$ok" -eq 1 ]; then
                sudo -u builder bash -lc "cd '$YAY_WORKDIR' && tar -xzf yay-bin.tar.gz"
                if [ -d "$YAY_WORKDIR/yay-bin" ]; then
                  install_from_dir="$YAY_WORKDIR/yay-bin"
                fi
              fi
            fi

            # If we obtained PKGBUILD sources from AUR, build/install via makepkg
            if [ -n "$install_from_dir" ]; then
              echo "yay: building from $install_from_dir"
              if sudo -u builder bash -lc "cd '$install_from_dir' && makepkg -si --noconfirm"; then
                echo "yay build/install finished"
              else
                echo "yay build/install failed"
                rm -rf "$YAY_WORKDIR"
                exit 1
              fi
            fi

            # 4) Final fallback: build/install yay via Go modules (no AUR required)
            if ! command -v yay &> /dev/null; then
              echo "yay: AUR endpoints unreachable - trying Go modules fallback..."

              pacman -S --needed --noconfirm go

              if sudo -u builder bash -lc "set -e; export GOBIN=\"\$HOME/.local/bin\"; mkdir -p \"\$GOBIN\"; go install github.com/Jguer/yay/v12@latest"; then
                if [ -x /home/builder/.local/bin/yay ]; then
                  install -m 755 /home/builder/.local/bin/yay /usr/local/bin/yay
                  echo "yay installed via Go modules fallback"
                fi
              fi
            fi

            # Final verification
            if command -v yay &> /dev/null; then
              if sudo -u builder yay --version; then
                echo "yay installed successfully"
              else
                echo "yay installed but failed to run"
                rm -rf "$YAY_WORKDIR"
                exit 1
              fi
            else
              echo "yay installation failed: AUR (https/ssh/snapshot) and Go fallback all failed"
              echo "=== yay diagnostics (AUR TLS) ==="
              timeout 10 curl -vI https://aur.archlinux.org/ 2>&1 | tail -80 || true
              rm -rf "$YAY_WORKDIR"
              exit 1
            fi

            rm -rf "$YAY_WORKDIR"
          else
            echo "yay already installed (from cache)"
            sudo -u builder yay --version
          fi

          # Restore pacman.conf
          mv /etc/pacman.conf.backup /etc/pacman.conf

          echo "Build dependencies installed"

      # ================== GPG & KEYRING (consolidated step) ==================
      # Previously pacman-key --init/--populate was called 4 times across
      # "Install Python", "Initialize GPG", and "Setup CachyOS" steps.
      # Now done once in bootstrap, and this step only handles GPG import
      # and CachyOS key import.
      - name: Initialize GPG and Setup CachyOS Repository
        shell: bash
        run: |
          set -euo pipefail

          echo "=== GPG Key Setup ==="

          # Import user GPG key if provided
          if [ -n "${GPG_PRIVATE_KEY:-}" ] && [ -n "${GPG_KEY_ID:-}" ]; then
            echo "Setting up GPG key for repository signing..."

            # Create temporary directory for GPG
            TEMP_GNUPG=$(mktemp -d)
            export GNUPGHOME="$TEMP_GNUPG"

            # Import private key
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import

            # Get fingerprint
            FINGERPRINT=$(gpg --list-keys --with-colons "$GPG_KEY_ID" | grep '^fpr:' | cut -d: -f10 | head -1)

            if [ -n "$FINGERPRINT" ]; then
              echo "Setting ultimate trust for key: $FINGERPRINT"
              echo "$FINGERPRINT:6:" | gpg --import-ownertrust

              # Export public key and add to pacman keyring
              gpg --export --armor "$FINGERPRINT" | sudo pacman-key --add -
              sudo pacman-key --lsign-key "$FINGERPRINT"
              echo "GPG key added to pacman-key"
            fi

            # Clean up
            unset GNUPGHOME
            rm -rf "$TEMP_GNUPG"
          else
            echo "No GPG key provided, repository will not be signed"
          fi

          echo ""
          echo "=== Setting up CachyOS Repository ==="

          CACHYOS_KEYID="F3B607488DB35A47"
          PACMAN_CONF="/etc/pacman.conf"

          echo "CACHYOS: IMPORT_KEY"
          ok=0
          for attempt in 1 2; do
            echo "CACHYOS: recv-keys attempt=${attempt}"
            if pacman-key --keyserver keyserver.ubuntu.com --recv-keys "${CACHYOS_KEYID}"; then
              ok=1
              break
            fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "CACHYOS: FAIL recv-keys"
            exit 1
          fi

          echo "CACHYOS: LSIGN_KEY"
          pacman-key --lsign-key "${CACHYOS_KEYID}"

          # Tier detection (znver4/5 > v4 > v3)
          tier="v3"
          if command -v gcc >/dev/null 2>&1; then
            march="$(gcc -march=native -Q --help=target 2>/dev/null | awk '/^\s+-march=/{print $2; exit}' || true)"
            if [ "${march:-}" = "znver4" ] || [ "${march:-}" = "znver5" ]; then
              tier="znver4"
            fi
          fi
          if [ "$tier" != "znver4" ]; then
            if /lib/ld-linux-x86-64.so.2 --help 2>/dev/null | grep -q "x86-64-v4 (supported"; then
              tier="v4"
            else
              tier="v3"
            fi
          fi
          echo "CACHYOS: TIER_SELECTED=${tier}"

          if [ "$tier" = "v3" ]; then
            arch_dir="x86_64_v3"
            repo_a="cachyos-v3"
            repo_b="cachyos-core-v3"
            repo_c="cachyos-extra-v3"
          elif [ "$tier" = "v4" ]; then
            arch_dir="x86_64_v4"
            repo_a="cachyos-v4"
            repo_b="cachyos-core-v4"
            repo_c="cachyos-extra-v4"
          else
            arch_dir="x86_64_v4"
            repo_a="cachyos-znver4"
            repo_b="cachyos-core-znver4"
            repo_c="cachyos-extra-znver4"
          fi

          echo "CACHYOS: CONFIG_APPEND_CHECK"
          # Safe non-regex check using exact section headers
          if grep -qF -e '[cachyos]' \
                      -e '[cachyos-v3]' \
                      -e '[cachyos-core-v3]' \
                      -e '[cachyos-extra-v3]' \
                      -e '[cachyos-v4]' \
                      -e '[cachyos-core-v4]' \
                      -e '[cachyos-extra-v4]' \
                      -e '[cachyos-znver4]' \
                      -e '[cachyos-core-znver4]' \
                      -e '[cachyos-extra-znver4]' "$PACMAN_CONF"; then
            echo "CACHYOS: already present -> skipping"
          else
            cp -a "$PACMAN_CONF" "${PACMAN_CONF}.bak.cachyos"

            TMP_CACHYOS=$(mktemp)
            cat > "$TMP_CACHYOS" <<'CACHYEOF'

          # ==============================
          # CachyOS repos (repo-only, key via keyserver, no extra installs)
          # Auto-selected tier: __TIER__
          # ==============================

          [__REPO_A__]
          SigLevel = Required
          Server = https://mirror.cachyos.org/repo/__ARCH_DIR__/__REPO_A__/

          [__REPO_B__]
          SigLevel = Required
          Server = https://mirror.cachyos.org/repo/__ARCH_DIR__/__REPO_B__/

          [__REPO_C__]
          SigLevel = Required
          Server = https://mirror.cachyos.org/repo/__ARCH_DIR__/__REPO_C__/

          [cachyos]
          SigLevel = Required
          Server = https://mirror.cachyos.org/repo/x86_64/cachyos/

          CACHYEOF

            esc_sed() { printf '%s' "$1" | sed -e 's/[\\&|]/\\&/g'; }
            sed -i "s|__TIER__|$(esc_sed "$tier")|g" "$TMP_CACHYOS"
            sed -i "s|__ARCH_DIR__|$(esc_sed "$arch_dir")|g" "$TMP_CACHYOS"
            sed -i "s|__REPO_A__|$(esc_sed "$repo_a")|g" "$TMP_CACHYOS"
            sed -i "s|__REPO_B__|$(esc_sed "$repo_b")|g" "$TMP_CACHYOS"
            sed -i "s|__REPO_C__|$(esc_sed "$repo_c")|g" "$TMP_CACHYOS"

            cat "$TMP_CACHYOS" >> "$PACMAN_CONF"
            rm -f "$TMP_CACHYOS"
          fi

          echo "CACHYOS: SYNC_DB"
          pacman -Sy --noconfirm
          pacman -Ss gcc14
          echo "CACHYOS: DONE"

      - name: System and Branch Information
        run: |
          echo "========================================="
          echo " OS RELEASE INFO"
          echo "========================================="
          cat /etc/os-release

          echo ""
          echo "========================================="
          echo " KERNEL & ARCHITECTURE"
          echo "========================================="
          uname -a

          echo ""
          echo "========================================="
          echo " MANJARO BRANCH (stable / testing / unstable)"
          echo "========================================="
          if command -v pacman-mirrors &> /dev/null; then
            echo "Active Manjaro branch:"
            pacman-mirrors -G
          else
            echo "'pacman-mirrors' not found. (Probably a plain Arch Linux container)"
          fi

          echo ""
          echo "========================================="
          echo " ENABLED PACMAN REPOS"
          echo "========================================="
          grep -E '^\[.*\]' /etc/pacman.conf

      - name: Run Builder with Cache Optimization
        env:
          # Only step-specific env vars here; secrets already set at job level
          PYTHONPATH: ${{ github.workspace }}/.github/scripts
          USE_CACHE: "true"
        run: |
          echo "=== Starting Builder with Cache Optimization ==="

          echo "Cache Status Before Build:"
          echo "  - Pacman cache: $(ls -1 /mnt/pacman_cache/*.pkg.tar.* 2>/dev/null | wc -l) files"
          echo "  - Built packages in cache: $(ls -1 /home/builder/build_artifacts/*.pkg.tar.* 2>/dev/null | wc -l) files"
          echo "  - AUR sources in cache: $(ls -1 build_aur/*/ 2>/dev/null | wc -l) directories"
          echo "  - VPS mirror cache: $(ls -1 /tmp/repo_mirror/*.pkg.tar.* 2>/dev/null | wc -l) files"

          echo "Current directory: $(pwd)"
          echo "Repository: $GITHUB_REPO"
          echo "PYTHONPATH: $PYTHONPATH"
          echo "PACKAGER_ENV status: $([ -n "$PACKAGER_ENV" ] && echo "SET (privacy protected)" || echo "NOT SET - using default")"

          echo ""
          echo "=== Repository Status ==="
          if [ -n "$REPO_SERVER_URL" ]; then
            if curl -s -I --connect-timeout 10 "$REPO_SERVER_URL" 2>/dev/null | head -n1 | grep -q "200\|404\|403"; then
              echo "Repository server is accessible"
            else
              echo "Repository server is NOT accessible (may be empty or not exist)"
            fi
          else
            echo "REPO_SERVER_URL not set, skipping repository check"
          fi

          echo ""
          echo "=== GPG Environment Check ==="
          if [ -n "${GPG_KEY_ID:-}" ] && [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            echo "GPG environment variables are set"
          else
            echo "GPG environment variables are NOT set (unsigned repo)"
          fi

          echo ""
          echo "=== Running Builder Script ==="

          # Make builder script executable
          chmod +x .github/scripts/builder.py

          # Run as builder user with PYTHONPATH set for modular imports
          su -m builder -c "cd '$PWD' && env PACKAGER_ENV='$PACKAGER_ENV' PYTHONPATH='$PYTHONPATH' python3 .github/scripts/builder.py 2>&1" | tee build_output.log

          BUILD_STATUS=$?
          echo ""
          echo "=== Build finished with exit code: $BUILD_STATUS ==="

          if [ -f "builder.log" ]; then
            echo "=== Last 50 lines of builder.log ==="
            tail -50 builder.log
          fi

          # Check for specific error patterns
          if grep -i "error\|failed\|exception" build_output.log | tail -20; then
            echo "=== Errors detected in build output ==="
          fi

          exit $BUILD_STATUS

      # ================== SAVE CACHES ==================
      # Save caches after successful build (or even on failure for debugging)
      - name: Save Pacman Package Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/pacman_cache
          key: ${{ runner.os }}-pacman-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-${{ github.run_id }}

      - name: Save Yay AUR Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/yay_cache
          key: ${{ runner.os }}-yay-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-${{ github.run_id }}

      - name: Save VPS Repository Mirror Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/vps_cache
          key: ${{ runner.os }}-vps-mirror-cache-manjaro-awesome-${{ hashFiles('packages.py') }}-${{ github.run_id }}

      - name: Save Built Packages Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            /mnt/build_artifacts
            build_aur
          key: ${{ runner.os }}-built-packages-cache-${{ hashFiles('packages.py', 'config.py', '**/PKGBUILD') }}-${{ github.run_id }}

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results-${{ github.run_id }}
          path: |
            builder.log
            build_output.log
            /mnt/build_artifacts/
          retention-days: 7
          if-no-files-found: warn

      - name: Cache Status Report
        if: always()
        run: |
          echo "=== Cache Status Report After Build ==="
          echo "Pacman cache saved: $(du -sh /mnt/pacman_cache 2>/dev/null | cut -f1 || echo '0')"
          echo "Built packages in cache: $(ls -1 /mnt/build_artifacts/*.pkg.tar.* 2>/dev/null | wc -l) files"
          echo "AUR sources in cache: $(ls -1 build_aur/*/ 2>/dev/null | wc -l) directories"
          echo "VPS mirror cache: $(du -sh /mnt/vps_cache 2>/dev/null | cut -f1 || echo '0')"

      - name: Cleanup Temporary Directories (Preserve Cache)
        if: always()
        run: |
          echo "=== Cleaning temporary directories (preserving cache) ==="

          # Cleanup builder temporary directories (but not cache directories)
          rm -rf /tmp/gpg_home_* 2>/dev/null || true
          rm -rf /tmp/*.pkg.tar.* 2>/dev/null || true

          # Cleanup builder home directories (but keep yay cache)
          rm -rf /home/builder/.cache/mozilla 2>/dev/null || true
          rm -rf /home/builder/.cache/pip 2>/dev/null || true
          rm -rf /home/builder/.cache/thumbnails 2>/dev/null || true

          # Cleanup workspace temporary files (but not built packages)
          find . -name ".SRCINFO" -type f -delete 2>/dev/null || true
          find /tmp -name "yay-*" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.log" -type f -not -name "builder.log" -not -name "build_output.log" -delete 2>/dev/null || true

          echo "Temporary directories cleaned (caches preserved for next run)"
